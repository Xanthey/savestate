<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>

    <linearGradient id="fluidGrad" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#7dd4ff"/>
      <stop offset="100%" stop-color="#1e6fc7"/>
    </linearGradient>

    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="clip2">
      <path d="M36,13 L36,36 L22,90 L78,90 L64,36 L64,13 Z"/>
    </clipPath>

  </defs>

  <!-- ── FLUID ── -->
  <g clip-path="url(#clip2)">

    <!-- Fluid body -->
    <polygon points="22,90 78,90 78,52 22,52" fill="url(#fluidGrad)"/>

    <!-- Animated surface wave — morphs between 3 wave shapes -->
    <path fill="#aee6ff" opacity="0.6">
      <animate
        attributeName="d"
        dur="3.5s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.45 0 0.55 1; 0.45 0 0.55 1; 0.45 0 0.55 1; 0.45 0 0.55 1"
        values="
          M22,52 Q36,48 50,52 Q64,56 78,50 L78,54 Q64,60 50,56 Q36,52 22,56 Z;
          M22,54 Q36,57 50,53 Q64,49 78,54 L78,58 Q64,53 50,57 Q36,61 22,58 Z;
          M22,51 Q36,55 50,54 Q64,53 78,51 L78,55 Q64,57 50,58 Q36,59 22,55 Z;
          M22,54 Q36,50 50,55 Q64,60 78,53 L78,57 Q64,64 50,59 Q36,54 22,58 Z;
          M22,52 Q36,48 50,52 Q64,56 78,50 L78,54 Q64,60 50,56 Q36,52 22,56 Z
        "
      />
    </path>

    <!-- Glow bloom -->
    <ellipse cx="50" cy="52" rx="28" ry="5" fill="#5ab4ff" opacity="0.25" filter="url(#glow2)">
      <animate attributeName="cy" values="52;54;52;53;52" dur="3.5s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1; 0.45 0 0.55 1; 0.45 0 0.55 1; 0.45 0 0.55 1"/>
    </ellipse>

    <!-- Bubble 1 — slow rise, loops -->
    <circle r="3.5" fill="#c8eeff">
      <animate attributeName="cx" values="38;40;38" dur="5s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
      <animate attributeName="cy" values="84;52" dur="5s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.3 0 0.7 1"/>
      <animate attributeName="opacity" values="0;0.55;0.55;0" dur="5s" repeatCount="indefinite"
        keyTimes="0;0.1;0.85;1"/>
      <animate attributeName="r" values="2.5;3.5;2" dur="5s" repeatCount="indefinite"/>
    </circle>

    <!-- Bubble 2 — offset timing, different path -->
    <circle r="2" fill="#c8eeff">
      <animate attributeName="cx" values="60;57;60" dur="4s" begin="1.8s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
      <animate attributeName="cy" values="86;56" dur="4s" begin="1.8s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.3 0 0.7 1"/>
      <animate attributeName="opacity" values="0;0.45;0.45;0" dur="4s" begin="1.8s" repeatCount="indefinite"
        keyTimes="0;0.1;0.85;1"/>
    </circle>

    <!-- Bubble 3 — tiny, fast, different column -->
    <circle r="1.4" fill="#ffffff">
      <animate attributeName="cx" values="48;46;48" dur="3s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="82;58" dur="3s" begin="0.7s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.3 0 0.7 1"/>
      <animate attributeName="opacity" values="0;0.35;0.35;0" dur="3s" begin="0.7s" repeatCount="indefinite"
        keyTimes="0;0.1;0.85;1"/>
    </circle>

  </g>

  <!-- ── GLASS OUTLINE ── -->
  <path d="
    M24,8
    L31,7 L69,7
    L69,13
    L64,13 L64,36
    L78,90
    L22,90
    L36,36 L36,13
    L31,13
    L24,8
  "
    fill="none"
    stroke="#3a8dde"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Spout lower lip -->
  <line x1="24" y1="8" x2="31" y2="10"
    stroke="#3a8dde" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="22" y1="90" x2="78" y2="90"
    stroke="#3a8dde" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Neck glint -->
  <line x1="39" y1="10" x2="39" y2="34"
    stroke="#fff" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round"/>

</svg>
